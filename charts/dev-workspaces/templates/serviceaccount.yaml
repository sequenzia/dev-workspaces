{{- if .Values.serviceAccount.create }}
{{/*
Build the merged annotation set:
  - any user-supplied .Values.serviceAccount.annotations
  - the OpenShift OAuth redirect-reference annotation, added ONLY when BOTH
    route.enabled AND oauthProxy.enabled (oauth-proxy authenticates against this
    SA as an OAuth client; the redirect reference points the OAuth flow at the
    Route, whose name equals dev-workspaces.fullname).
*/}}
{{- $annotations := merge (dict) (.Values.serviceAccount.annotations | default dict) -}}
{{- if and .Values.route.enabled .Values.oauthProxy.enabled -}}
{{- $_ := set $annotations "serviceaccounts.openshift.io/oauth-redirectreference.primary" (include "dev-workspaces.oauthRedirectReference" .) -}}
{{- end -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dev-workspaces.fullname" . }}
  labels:
    {{- include "dev-workspaces.labels" . | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- with .Values.serviceAccount.imagePullSecrets }}
imagePullSecrets:
  {{- range . }}
  - name: {{ .name }}
  {{- end }}
{{- end }}
{{- end }}
